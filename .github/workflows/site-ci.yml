name: site-ci
on:
  push: { paths: ["site/**", "Cargo.toml"] }
  pull_request: { paths: ["site/**", "Cargo.toml"] }
jobs:
  build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: site } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: site/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test           # braille + version guard
      - run: pnpm build
